version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: events_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-events_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-events_pass}
      POSTGRES_DB: ${POSTGRES_DB:-events_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-events_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - events_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: events_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - events_network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: events_backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-events_user}:${POSTGRES_PASSWORD:-events_pass}@postgres:5432/${POSTGRES_DB:-events_db}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-this-in-production}
      DEBUG: ${DEBUG:-false}
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:5173"]'
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - events_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Frontend (development)
  # Uncomment when frontend is ready
  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #   container_name: events_frontend
  #   ports:
  #     - "3000:3000"
  #   volumes:
  #     - ./frontend:/app
  #     - /app/node_modules
  #   depends_on:
  #     - backend
  #   networks:
  #     - events_network
  #   environment:
  #     VITE_API_URL: http://localhost:8000

volumes:
  postgres_data:
  redis_data:

networks:
  events_network:
    driver: bridge
